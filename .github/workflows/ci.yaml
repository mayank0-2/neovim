name: CI
on: [pull_request]

jobs:
  test-neovim-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Neovim
        uses: MunifTanjim/setup-neovim-action@v1
        with:
          tag: nightly  # or specify a stable version like v0.9.4

      - name: Check Neovim version
        run: nvim --version

      - name: Run Neovim config test
        run: |
          # Example: Run a simple Neovim command to check if config loads
          nvim --headless -c 'echo "Neovim config loaded successfully"' -c 'q'   